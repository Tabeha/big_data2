version: "3.9"

services:
  hadoop-master:
    build: .
    container_name: hadoop-master
    hostname: hadoop-master
    environment:
      CONTAINER_ROLE: master
      HADOOP_HOME: /opt/hadoop
      SPARK_HOME: /opt/spark
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      HDFS_NAMENODE_USER: root
      HDFS_DATANODE_USER: root
      HDFS_SECONDARYNAMENODE_USER: root
      YARN_RESOURCEMANAGER_USER: root
      YARN_NODEMANAGER_USER: root
    ports:
      - "9870:9870"
      - "8088:8088"
      - "9010:9000"
      - "4040:4040"
    volumes:
      - ./app:/workspace/app
      - hadoop_namenode:/hadoop/dfs/name
      - hadoop_datanode_master:/hadoop/dfs/data
    depends_on:
      - cassandra
    networks:
      - bigdata-net

  hadoop-worker:
    build: .
    container_name: hadoop-worker
    hostname: hadoop-worker
    environment:
      CONTAINER_ROLE: worker
      HADOOP_HOME: /opt/hadoop
      SPARK_HOME: /opt/spark
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      HDFS_NAMENODE_USER: root
      HDFS_DATANODE_USER: root
      HDFS_SECONDARYNAMENODE_USER: root
      YARN_RESOURCEMANAGER_USER: root
      YARN_NODEMANAGER_USER: root
    volumes:
      - ./app:/workspace/app
      - hadoop_datanode_worker:/hadoop/dfs/data
    depends_on:
      - hadoop-master
      - cassandra
    networks:
      - bigdata-net

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: search-engine-cluster
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - bigdata-net

volumes:
  hadoop_namenode:
  hadoop_datanode_master:
  hadoop_datanode_worker:
  cassandra_data:

networks:
  bigdata-net:
    driver: bridge